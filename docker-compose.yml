services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: worldbuilder
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: worlddb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldbuilder -d worlddb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/data/uploads
    environment:
      - DATABASE_URL=postgresql://worldbuilder:password123@db:5432/worlddb
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_PORTRAIT_IMAGE_MODEL=${OPENAI_PORTRAIT_IMAGE_MODEL:-gpt-image-2}
      - OPENAI_TOKEN_IMAGE_MODEL=${OPENAI_TOKEN_IMAGE_MODEL:-gpt-image-1.5}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source from the host so edits are visible without rebuilding.
      - ./frontend:/app
      # Keep Linux dependencies and Next's generated cache inside Docker. This
      # prevents host node_modules (especially macOS native packages) from
      # replacing the modules installed in the image.
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - BACKEND_URL=http://backend:8000
      # Docker Desktop file-system events are not always forwarded to Linux
      # containers, so let Next/Watchpack poll the bind mount for HMR changes.
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=500
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
  uploads_data:
