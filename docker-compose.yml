services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: worldbuilder
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: worlddb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldbuilder -d worlddb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app/apps/backend
      - uploads_data:/app/apps/backend/data/uploads
      - ./models:/models:ro
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://worldbuilder:password123@db:5432/worlddb
      CMS_BASE_URL: http://cms:3000
      LLAMA_MODEL_PATH: /models/model.gguf
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - cms_private

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source from the host so edits are visible without rebuilding.
      - ./apps/frontend:/app/apps/frontend
      # The frontend imports the shared geometry package's browser entry point
      # directly. Mount its source as well so geometry exports stay in sync.
      - ./packages/common/src:/app/packages/common/src:ro
      # Keep Linux node_modules and Next's cache inside Docker so macOS
      # native packages don't replace the Linux-built ones.
      - frontend_app_node_modules:/app/apps/frontend/node_modules
      - frontend_next:/app/apps/frontend/.next
    env_file:
      - ./apps/frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_URL: http://backend:8000
      # Docker Desktop file-system events are not always forwarded to Linux
      # containers, so let Next/Watchpack poll the bind mount for HMR changes.
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "500"
    depends_on:
      - backend

  cms-db:
    image: postgres:17-alpine
    env_file:
      - ./apps/cms/.env
    entrypoint:
      - /bin/sh
      - -c
      - export POSTGRES_PASSWORD="$$CMS_POSTGRES_PASSWORD"; exec docker-entrypoint.sh postgres
    environment:
      POSTGRES_DB: worldcms
      POSTGRES_USER: worldcms
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcms -d worldcms"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cms_postgres_data:/var/lib/postgresql/data
    networks:
      - cms_private

  cms-storage:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    env_file:
      - ./apps/cms/.env
    entrypoint:
      - /bin/sh
      - -c
    command:
      - export MINIO_ROOT_USER="$$S3_ACCESS_KEY_ID"; export MINIO_ROOT_PASSWORD="$$S3_SECRET_ACCESS_KEY"; exec /usr/bin/minio server /data --console-address ":9001"
    expose:
      - "9000"
    volumes:
      - cms_storage_data:/data
    networks:
      - cms_private

  cms-storage-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until /usr/bin/mc alias set cms-storage http://cms-storage:9000 "$$S3_ACCESS_KEY_ID" "$$S3_SECRET_ACCESS_KEY"; do sleep 1; done
        /usr/bin/mc mb --ignore-existing "cms-storage/$$S3_BUCKET"
        /usr/bin/mc anonymous set none "cms-storage/$$S3_BUCKET"
    env_file:
      - ./apps/cms/.env
    depends_on:
      - cms-storage
    networks:
      - cms_private

  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    env_file:
      - ./apps/cms/.env
    environment:
      CMS_DATABASE_HOST: cms-db
      CMS_DATABASE_PORT: "5432"
      CMS_ENABLE_LOCAL_ADMIN: "false"
      S3_ENDPOINT: http://cms-storage:9000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      cms-db:
        condition: service_healthy
      cms-storage-init:
        condition: service_completed_successfully
    networks:
      - cms_private

volumes:
  postgres_data:
  frontend_app_node_modules:
  frontend_next:
  uploads_data:
  cms_postgres_data:
  cms_storage_data:

networks:
  cms_private:
    internal: true
