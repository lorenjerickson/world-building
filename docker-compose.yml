services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: worldbuilder
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: worlddb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldbuilder -d worlddb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app/apps/backend
      - uploads_data:/app/apps/backend/data/uploads
      - ./models:/models:ro
    environment:
      - DATABASE_URL=postgresql://worldbuilder:password123@db:5432/worlddb
      - CMS_BASE_URL=http://cms:3000
      - CMS_INTERNAL_TOKEN=${CMS_INTERNAL_TOKEN:?Set CMS_INTERNAL_TOKEN in .env}
      - RULE_API_INTERNAL_TOKEN=${RULE_API_INTERNAL_TOKEN:?Set RULE_API_INTERNAL_TOKEN in .env}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_LLM_MODEL=${OPENAI_LLM_MODEL:-gpt-4o-mini}
      - OPENAI_PORTRAIT_IMAGE_MODEL=${OPENAI_PORTRAIT_IMAGE_MODEL:-gpt-image-2}
      - OPENAI_TOKEN_IMAGE_MODEL=${OPENAI_TOKEN_IMAGE_MODEL:-gpt-image-1.5}
      - LLAMA_MODEL_PATH=${LLAMA_MODEL_PATH:-/models/model.gguf}
      - LLAMA_CONTEXT_SIZE=${LLAMA_CONTEXT_SIZE:-8192}
      - LLAMA_GPU_LAYERS=${LLAMA_GPU_LAYERS:-auto}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - cms_private

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source from the host so edits are visible without rebuilding.
      - ./apps/frontend:/app/apps/frontend
      # Keep Linux node_modules and Next's cache inside Docker so macOS
      # native packages don't replace the Linux-built ones.
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/apps/frontend/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - BACKEND_URL=http://backend:8000
      - RULE_API_INTERNAL_TOKEN=${RULE_API_INTERNAL_TOKEN:?Set RULE_API_INTERNAL_TOKEN in .env}
      - AUTH0_BASE_URL=${AUTH0_BASE_URL:-${APP_BASE_URL:?Set AUTH0_BASE_URL or APP_BASE_URL in .env}}
      - AUTH0_ISSUER_BASE_URL=${AUTH0_ISSUER_BASE_URL:-https://${AUTH0_DOMAIN:?Set AUTH0_ISSUER_BASE_URL or AUTH0_DOMAIN in .env}}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:?Set AUTH0_CLIENT_ID in .env}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:?Set AUTH0_CLIENT_SECRET in .env}
      - AUTH0_SECRET=${AUTH0_SECRET:?Set AUTH0_SECRET in .env}
      # Docker Desktop file-system events are not always forwarded to Linux
      # containers, so let Next/Watchpack poll the bind mount for HMR changes.
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=500
    depends_on:
      - backend

  cms-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: worldcms
      POSTGRES_USER: worldcms
      POSTGRES_PASSWORD: ${CMS_POSTGRES_PASSWORD:?Set CMS_POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcms -d worldcms"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cms_postgres_data:/var/lib/postgresql/data
    networks:
      - cms_private

  cms-storage:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${CMS_S3_ACCESS_KEY_ID:?Set CMS_S3_ACCESS_KEY_ID in .env}
      MINIO_ROOT_PASSWORD: ${CMS_S3_SECRET_ACCESS_KEY:?Set CMS_S3_SECRET_ACCESS_KEY in .env}
    expose:
      - "9000"
    volumes:
      - cms_storage_data:/data
    networks:
      - cms_private

  cms-storage-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until /usr/bin/mc alias set cms-storage http://cms-storage:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done
        /usr/bin/mc mb --ignore-existing "cms-storage/$$S3_BUCKET"
        /usr/bin/mc anonymous set none "cms-storage/$$S3_BUCKET"
    environment:
      MINIO_ROOT_USER: ${CMS_S3_ACCESS_KEY_ID:?Set CMS_S3_ACCESS_KEY_ID in .env}
      MINIO_ROOT_PASSWORD: ${CMS_S3_SECRET_ACCESS_KEY:?Set CMS_S3_SECRET_ACCESS_KEY in .env}
      S3_BUCKET: ${CMS_S3_BUCKET:-worldcms-media}
    depends_on:
      - cms-storage
    networks:
      - cms_private

  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    environment:
      CMS_DATABASE_URL: postgresql://worldcms:${CMS_POSTGRES_PASSWORD:?Set CMS_POSTGRES_PASSWORD in .env}@cms-db:5432/worldcms
      PAYLOAD_SECRET: ${CMS_PAYLOAD_SECRET:?Set CMS_PAYLOAD_SECRET in .env}
      CMS_INTERNAL_TOKEN: ${CMS_INTERNAL_TOKEN:?Set CMS_INTERNAL_TOKEN in .env}
      S3_ACCESS_KEY_ID: ${CMS_S3_ACCESS_KEY_ID:?Set CMS_S3_ACCESS_KEY_ID in .env}
      S3_SECRET_ACCESS_KEY: ${CMS_S3_SECRET_ACCESS_KEY:?Set CMS_S3_SECRET_ACCESS_KEY in .env}
      S3_BUCKET: ${CMS_S3_BUCKET:-worldcms-media}
      S3_ENDPOINT: http://cms-storage:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: ${CMS_S3_REGION:-us-east-1}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      cms-db:
        condition: service_healthy
      cms-storage-init:
        condition: service_completed_successfully
    networks:
      - cms_private

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
  uploads_data:
  cms_postgres_data:
  cms_storage_data:

networks:
  cms_private:
    internal: true
